<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
        <title>PulseX Console Radar</title>
    </head>
    <body>
        <div class="layout">
            <aside class="consolePanel">
                <header class="consoleHeader">
                    <div>
                        <p class="consoleKicker">PulseX</p>
                        <h1>Console</h1>
                    </div>
                </header>

                <pulsex-radar-command-line></pulsex-radar-command-line>

            </aside>

            <main class="radarPanel">
                <header class="radarHeader">
                    <div>
                        <p class="consoleKicker">Radar</p>
                        <h2>Balayage en direct</h2>
                    </div>
                </header>

                <section class="radarShell">
                    <div class="radarFrame">
                        <pulsex-radar id="radar"></pulsex-radar>
                    </div>
                </section>
            </main>
        </div>

        <script type="module" src="{{ url_for('static', filename='js/script.js') }}"></script>
    </body>
</html>
