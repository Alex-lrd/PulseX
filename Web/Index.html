<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="./css/styles.css" rel="stylesheet" />
        <title>PulseX Console Radar</title>
    </head>
    <body>
        <div class="layout">
            <aside class="console-panel">
                <header class="console-header">
                    <div>
                        <p class="console-kicker">PulseX</p>
                        <h1>Console</h1>
                    </div>
                </header>

                <section class="console-log-panel">
                    <div class="console-log-header">
                        <h2>Journal</h2>
                    </div>

                    <div class="console-log" id="consoleLog"></div>
                </section>

                <pulsex-radar-console></pulsex-radar-console>

            </aside>

            <main class="radar-panel">
                <header class="radar-header">
                    <div>
                        <p class="console-kicker">Radar</p>
                        <h2>Balayage en direct</h2>
                    </div>
                </header>

                <section class="radar-shell">
                    <div class="radar-frame">
                        <pulsex-radar id="radar" class="radar"></pulsex-radar>
                    </div>
                </section>
            </main>
        </div>

        <script type="module" src="./js/script.js"></script>
    </body>
</html>
